name: Nightly

on:
  schedule:
    - cron: '27 8 * * *'  # 8:27am UTC daily
  workflow_dispatch:  # allow manual trigger

jobs:
  nightly:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      Z3_VERSION: "4.16.0"
      Z3_GLIBC: "2.39"
    steps:
      - uses: actions/checkout@v6
      - name: Check if already tested
        id: check-sha
        uses: actions/cache@v5
        with:
          path: .nightly-sha
          key: nightly-tested-${{ github.sha }}
      - name: Skip if already tested
        if: steps.check-sha.outputs.cache-hit == 'true'
        run: |
          echo "HEAD (${{ github.sha }}) was already tested by a previous nightly run. Skipping."
          echo "SKIP=true" >> "$GITHUB_ENV"
      - name: Set up Python
        if: env.SKIP != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Cache pip dependencies
        if: env.SKIP != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-3.14-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-3.14-
      - name: Install dependencies
        if: env.SKIP != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache Z3
        if: env.SKIP != 'true'
        id: cache-z3
        uses: actions/cache@v5
        with:
          path: z3-${{ env.Z3_VERSION }}-x64-glibc-${{ env.Z3_GLIBC }}
          key: z3-${{ env.Z3_VERSION }}-glibc-${{ env.Z3_GLIBC }}
      - name: Install Z3
        if: env.SKIP != 'true' && steps.cache-z3.outputs.cache-hit != 'true'
        run: |
          wget -nv https://github.com/Z3Prover/z3/releases/download/z3-${Z3_VERSION}/z3-${Z3_VERSION}-x64-glibc-${Z3_GLIBC}.zip
          unzip z3-${Z3_VERSION}-x64-glibc-${Z3_GLIBC}.zip
      - name: Set up Z3 paths
        if: env.SKIP != 'true'
        run: |
          echo `pwd`/z3-${Z3_VERSION}-x64-glibc-${Z3_GLIBC}/bin >> $GITHUB_PATH
          echo PYTHONPATH=`pwd`/z3-${Z3_VERSION}-x64-glibc-${Z3_GLIBC}/bin/python >> $GITHUB_ENV
      - name: Run full test suite
        if: env.SKIP != 'true'
        run: make gh-test-full
      - name: Mark SHA as tested
        if: env.SKIP != 'true'
        run: echo "${{ github.sha }}" > .nightly-sha
